name: Release

on:
  push:
    branches:
      - master # Triggers when code is pushed to the main branch
  pull_request:
    branches:
      - master
jobs:
  release:
    permissions:
      packages: write
      contents: write
      issues: write
      deployments: write
    runs-on: ubuntu-latest # Runs on an Ubuntu runner

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          # You can specify specifying version range for the extra plugins if you prefer.
          extra_plugins: |
            @semantic-release/changelog@6.0.0
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/jhparker7/blueprints:${{ steps.semantic.outputs.new_release_version }}, ghcr.io/jhparker7/blueprints:latest
